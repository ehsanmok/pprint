package:
  name: pprint
  version: "0.1.0"

source:
  path: .

build:
  script:
    - mkdir -p $PREFIX/lib/mojo
    - cp -r pprint $PREFIX/lib/mojo/

requirements:
  host:
    - mojo ==0.26.3.0.dev2026042005
  run:
    - mojo ==0.26.3.0.dev2026042005

about:
  summary: Reflection-driven pretty printer for Mojo structs
  license: MIT
